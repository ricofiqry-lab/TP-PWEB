<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife Gym - Pendaftaran Member</title>
    <link rel="stylesheet" href="sty.css">
  </head>
<body>

<div class="container">
    <h2>SEWA & BOKING KOST</h2>
    <p class="subtitle">Formulir Sewa Kamar Kost</p>
    
    <form action="save.php" method="POST">
        <div class="grid-form">
            
            <div class="form-group">
                <label for="nama_lengkap">Nama Lengkap Penyewa</label>
                <input type="text" id="nama" name="nama" placeholder="Contoh: AHAYYY" required>
            </div>
            
            <div class="form-group">
                <label for="telepon">Nomor WhatsApp</label>
                <input type="tel" id="telepon" name="telepon" placeholder="Contoh: 081234567xx" required>
            </div>

            <div class="form-group">
                <label for="tanggal_mulai">Tanggal Mulai Masuk</label>
                <input type="date" id="tanggal_mulai" name="tanggal_mulai" required>
            </div>

            <div class="form-group">
                <label for="paket">Nomor Kamar</label>
                <select id="paket" name="paket" required>
                    <option value="">-- Pilih Nomor Kamar --</option>
                    <option value="1">Kamar 1</option>
                    <option value="2">Kamar 2</option>
                    <option value="3">Kamar 3</option>
                    <option value="4">Kamar 4</option>
                    <option value="5">Kamar 5</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="trainer">Durasi Sewa</label>
                <select id="trainer" name="trainer" required>
                    <option value="1 Bulan">1 Bulan</option>
                    <option value="3 Bulan">3 Bulan</option>
                    <option value="6 Bulan">6 Bulan</option>
                    <option value="12 Bulan">12 Bulan</option>
                </select>
            </div>
            
            <div class="btn-container">
                <button type="submit" class="btn-submit">Boking Sekarang & Simpan Data</button>
            </div>
        </div>
    </form>
</div>

</body>
</html>
